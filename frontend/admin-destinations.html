<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Management</title>

    <link rel="stylesheet" href="admin-destinations.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2>Explore Bharat</h2>

        <ul>

            <li onclick="window.location.href='messages.html'">
                <i class="fa-solid fa-envelope"></i>
                Messages
            </li>

            <li class="active">
                <i class="fa-solid fa-location-dot"></i>
                Destinations
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="content">

        <div class="topbar">

            <div>
                <h1>Destination Management</h1>
                <p>Add, edit and delete destinations</p>
            </div>

            <button id="logoutBtn">
                Logout
            </button>

        </div>

        <!-- Add Form -->
        <div class="form-card">

    <div class="card-header">
        <h2>Add New Destination</h2>
        <p>Fill in the details below to add a new destination.</p>
    </div>

    <form id="destinationForm">

        <div class="input-group">
            <label>Destination Name</label>
            <input type="text" id="name" placeholder="Enter destination name" required>
        </div>

        <div class="row">

            <div class="input-group">
                <label>Category</label>

                <select id="category">
                    <option value="">Select Category</option>
                    <option>Temple</option>
                    <option>Heritage</option>
                    <option>Nature</option>
                    <option>Beach</option>
                    <option>Hill Station</option>
                    <option>City</option>
                </select>

            </div>

            <div class="input-group">
                <label>Location</label>
                <input type="text" id="location" placeholder="Enter location" required>
            </div>

        </div>

        <div class="input-group">
            <label>Image URL</label>
            <input type="text" id="image" placeholder="Paste image URL">
        </div>

        <div class="image-preview">

            <img
                id="previewImage"
                src="https://placehold.co/500x250?text=Image+Preview"
                alt="Preview">

        </div>

        <div class="input-group">
            <label>Description</label>

            <textarea
                id="description"
                rows="5"
                placeholder="Write a short description..."
                required></textarea>

        </div>

        <button class="add-btn" type="submit" id="submitBtn">
            <i class="fa-solid fa-plus"></i>
            Add Destination
        </button>

    </form>

</div>

<!-- Destination Table -->
<div class="table-card">
    <div class="table-header">
        <h2>All Destinations</h2>
        <input
            type="text"
            id="searchDestination"
            placeholder="🔍 Search destination...">
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Location</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="destinationTable">
            </tbody>
        </table>
    </div>
</div>
    </main>
</div>

<script src="admin-destinations.js"></script>

</body>
</html>
